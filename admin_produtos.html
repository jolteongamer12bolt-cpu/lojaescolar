<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Produtos - Admin</title>
    <style>
        body { background: #030404; color: #e8eaed; padding: 30px; font-family: 'Segoe UI', Arial, sans-serif; }
        form { background: #0e1012; padding: 25px; border-radius: 8px; max-width: 600px; margin-bottom: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #80868b; }
        input, select, textarea { width: 100%; padding: 10px; background: #121416; border: 1px solid #2d0b0b; border-radius: 4px; color: white; }
        button { background: #b31010; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #2d0b0b; }
        th { background: #121416; }
    </style>
</head>
<body>
    <h1>🛍️ Gerenciar Produtos</h1>
    <p><a href="/admin">← Voltar para o Painel Admin</a></p>

    <h2>Adicionar Novo Produto</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Nome do Produto</label>
            <input type="text" name="nome" required>
        </div>
        <div class="form-group">
            <label>Descrição</label>
            <textarea name="descricao" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" step="0.01" name="preco" required>
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select name="categoria" required>
                <option value="Lanches">Lanches (Comida)</option>
                <option value="Contas de Jogos">Contas de Jogos / Robux</option>
            </select>
        </div>
        <div class="form-group">
            <label>Imagem do Produto</label>
            <input type="file" name="imagem" accept="image/*">
        </div>
        <button type="submit">Adicionar Produto</button>
    </form>

    <h2>Produtos Cadastrados</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Imagem</th>
        </tr>
        {% for p in produtos %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nome }}</td>
            <td>{{ p.categoria }}</td>
            <td>R$ {{ "%.2f"|format(p.preco) }}</td>
            <td>
                {% if p.imagem %}
                    <img src="{{ url_for('static', filename='uploads/' + p.imagem) }}" width="60">
                {% else %}
                    Sem imagem
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>

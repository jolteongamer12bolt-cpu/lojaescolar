<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - Fazenda São Bento</title>
    <style>
        body { background: #030404; color: #e8eaed; padding: 40px; font-family: 'Segoe UI', Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; background: #0e1012; padding: 30px; border-radius: 10px; }
        h1 { color: #b31010; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #80868b; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #121416; border: 1px solid #2d0b0b; border-radius: 6px; color: white; }
        button { background: #b31010; color: white; padding: 14px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .current-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #b31010; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meu Perfil</h1>
        
        <form method="POST" enctype="multipart/form-data">
            <div style="text-align: center; margin-bottom: 25px;">
                {% if usuario['foto'] %}
                    <img src="{{ url_for('static', filename='uploads/' + usuario['foto']) }}" class="current-photo">
                {% else %}
                    <div style="width:120px; height:120px; background:#1c1e22; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
                {% endif %}
            </div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="nome" value="{{ usuario['nome'] }}" required>
            </div>

            <div class="form-group">
                <label>Série Escolar</label>
                <input type="text" name="serie" value="{{ usuario['serie'] }}" required>
            </div>

            <div class="form-group">
                <label>Alterar Foto de Perfil</label>
                <input type="file" name="foto" accept="image/*">
            </div>

            <button type="submit">Salvar Alterações</button>
        </form>

        <br>
        <a href="/" style="color:#b31010;">← Voltar para a Loja</a>
    </div>
</body>
</html>
